<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic – French Hub</title>
    <style>
        :root {
            --bg: #f9f7f1; --card: #ffffff; --text: #2b2416;
            --text-light: #5c5344; --accent: #c75b2c;
            --border: #e5ddd0; --radius: 12px;
        }
        body { font-family: 'Segoe UI', Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.5; margin: 0; }
        .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; margin-bottom: 1.2rem; }
        .ok { color: #2e7d32; } .warn { color: #e65100; } .err { color: #c62828; }
        .log-entry { padding: 0.2rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    </style>
</head>
<body>
    <!-- Inline header (never breaks) -->
    <header style="display:flex;align-items:center;justify-content:space-between;background:var(--card,#fff);border-bottom:1px solid var(--border);padding:0.6rem 1.5rem;">
        <div><img src="icon-frenchHub.png" alt="Logo" width="32" height="32"></div>
        <div style="text-align:center;"><strong>Educational Dashboard<br>French Hub</strong></div>
        <div><button id="settingsBtn" style="background:#f0e8d8;border:1px solid #e5ddd0;font-size:1.3rem;cursor:pointer;padding:0.3rem 0.7rem;border-radius:8px;">⚙️</button></div>
    </header>
    <div id="settingsModal" style="display:none;position:fixed;z-index:100;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.5);">
        <div style="background:var(--card,#fff);color:var(--text);margin:15% auto;padding:1.5rem;border-radius:12px;width:80%;max-width:400px;text-align:center;">
            <span id="closeModalBtn" style="position:absolute;top:8px;right:16px;font-size:1.5rem;cursor:pointer;">&times;</span>
            <p>⚙️ Paramètres – Bientôt disponible</p>
        </div>
    </div>

    <main class="container">
        <h1>🩺 Diagnostic complet</h1>
        <div class="panel"><h2>Résumé</h2><div id="summary">Initialisation…</div></div>
        <div class="panel"><h2>Journal</h2><div id="log-container"></div></div>
        <div class="panel"><h2>Actions</h2>
            <button onclick="location.reload()">🔄 Recharger</button>
            <button onclick="clearAll()">🧹 Effacer données du site</button>
        </div>
    </main>

    <!-- Inline footer (never breaks) -->
    <footer style="display:flex;align-items:center;justify-content:space-between;background:var(--card,#fff);border-top:1px solid var(--border);padding:1.2rem 1.5rem;font-size:0.85rem;color:var(--text-light);margin-top:2rem;">
        <div><p>Développé par <strong>Mejri Ziad</strong><br>Hébergé sur GitHub &amp; Netlify</p></div>
        <div>
            <a href="#" style="color:var(--accent,#c75b2c);">Contact</a> |
            <a href="#" style="color:var(--accent,#c75b2c);">Politique de confidentialité</a> |
            <a href="#" style="color:var(--accent,#c75b2c);">Conditions d’utilisation</a>
        </div>
        <div><p>Version 0.0.1</p></div>
    </footer>

    <script>
        // ─── Immediate SW cleanup ────────────────────────────
        (async function cleanup() {
            if (!('serviceWorker' in navigator)) return;
            const regs = await navigator.serviceWorker.getRegistrations();
            if (regs.length > 0 || navigator.serviceWorker.controller) {
                // There is a SW – unregister it and clear caches, then reload
                for (const reg of regs) await reg.unregister();
                const keys = await caches.keys();
                for (const key of keys) await caches.delete(key);
                // Reload the page once, after a short delay
                setTimeout(() => location.reload(true), 500);
            }
        })();

        // ─── Modal logic ────────────────────────────────────
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('settingsModal');
            if (e.target.id === 'settingsBtn') {
                modal.style.display = 'block';
            } else if (e.target.id === 'closeModalBtn' || e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // ─── Diagnostic engine ──────────────────────────────
        const logContainer = document.getElementById('log-container');
        const summaryDiv = document.getElementById('summary');
        let ok = 0, warn = 0, err = 0;

        function log(msg, level = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span style="color:var(--text-light);">[${time}]</span> ${msg}`;
            if (level === 'success') entry.classList.add('ok');
            else if (level === 'warn') entry.classList.add('warn');
            else if (level === 'error') entry.classList.add('err');
            logContainer.appendChild(entry);
            if (level === 'error') err++;
            else if (level === 'warn') warn++;
            else if (level === 'success') ok++;
            updateSummary();
        }

        function updateSummary() {
            summaryDiv.innerHTML = `✅ OK: ${ok} ⚠️ Avertissements: ${warn} ❌ Erreurs: ${err} — ${err === 0 ? 'Tests OK' : 'Problèmes détectés'}`;
        }

        window.onerror = (msg, src, line) => log(`Erreur JS: ${msg} (${src}:${line})`, 'error');

        // Run diagnostics after load
        window.addEventListener('load', async () => {
            log('Page chargée – début des vérifications.', 'info');

            // Check containers
            log('Conteneur header: présent.', 'success');
            log('Conteneur footer: présent.', 'success');

            // Check CSS
            const testEl = document.createElement('div');
            testEl.className = 'site-header';
            document.body.appendChild(testEl);
            const display = getComputedStyle(testEl).display;
            document.body.removeChild(testEl);
            log(`CSS display (site-header): ${display}`, display === 'flex' ? 'success' : 'warn');

            // Check SW status after cleanup
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                log(`Service Workers actifs: ${regs.length}`, regs.length === 0 ? 'success' : 'warn');
                if (navigator.serviceWorker.controller) {
                    log('Page contrôlée par un SW !', 'warn');
                } else {
                    log('Aucun SW ne contrôle cette page.', 'success');
                }
            }

            // Check security headers (try HEAD request)
            try {
                const resp = await fetch('/', { method: 'HEAD' });
                const headers = {};
                resp.headers.forEach((v, k) => headers[k.toLowerCase()] = v);
                ['x-frame-options', 'x-content-type-options', 'referrer-policy'].forEach(h => {
                    if (headers[h]) log(`En-tête ${h}: ${headers[h]}`, 'success');
                    else log(`En-tête ${h} manquant`, 'warn');
                });
            } catch(e) {
                log('Impossible de vérifier les en-têtes', 'warn');
            }

            // Test external file availability (without executing)
            try {
                const resp = await fetch('ED-French-ini.js', { cache: 'no-store' });
                const text = await resp.text();
                const isHtml = text.trim().startsWith('<!');
                log(`Fichier ED-French-ini.js: statut ${resp.status}, HTML=${isHtml}`, isHtml ? 'error' : 'success');
            } catch(e) {
                log('Fichier ED-French-ini.js introuvable ou réseau', 'error');
            }

            log('Diagnostic terminé.', 'info');
        });

        // Clear everything manually
        window.clearAll = async function() {
            if (confirm('Effacer SW, caches, localStorage ?')) {
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (const reg of regs) await reg.unregister();
                }
                const keys = await caches.keys();
                for (const key of keys) await caches.delete(key);
                localStorage.clear();
                sessionStorage.clear();
                alert('Données effacées. Rechargez la page.');
                location.reload(true);
            }
        };
    </script>
</body>
</html>
