<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test final (environnement propre)</title>
    <style>
        :root {
            --bg: #f9f7f1; --card: #ffffff; --text: #2b2416;
            --text-light: #5c5344; --heading: #382e1e; --accent: #c75b2c;
            --accent-hover: #a3441d; --border: #e5ddd0;
            --button-bg: #f0e8d8; --button-hover: #e3d5bc;
        }
        body.dark {
            --bg: #1e1b17; --card: #2a2620; --text: #e8dfd2;
            --text-light: #b9aa95; --heading: #f0e4d2; --accent: #e07b4a;
            --accent-hover: #f08c5c; --border: #3e3830;
            --button-bg: #3a3329; --button-hover: #4e4437;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: background 0.25s, color 0.25s; }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.8rem 1.6rem; background: var(--card);
            border-bottom: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            position: sticky; top:0; z-index:10;
        }
        .breadcrumb { font-size:0.85rem; color:var(--text-light); }
        .breadcrumb a { color:var(--accent); text-decoration:none; font-weight:600; }
        .theme-btn {
            display:inline-flex; align-items:center; gap:0.4rem;
            padding:0.45rem 0.9rem; border-radius:20px;
            border:1px solid var(--border); background: var(--button-bg);
            color:var(--text); cursor:pointer; font-size:0.85rem; font-weight:600;
            transition: all 0.25s;
        }
        .theme-btn:hover { background: var(--button-hover); }
        .container { max-width:800px; margin:0 auto; padding:2rem 1.4rem; }
        .status-box {
            background: var(--card); border:1px solid var(--border);
            border-radius:12px; padding:1.2rem; margin:1rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            word-break: break-all;
        }
        .success { color: #2e7d32; font-weight: bold; }
        .fail { color: #c62828; font-weight: bold; }
        .log { font-size:0.85rem; margin:0.5rem 0; }
        .log-entry { padding:0.2rem 0; border-bottom:1px solid var(--border); }
    </style>
</head>
<body>
<div id="header-container"></div>

<header class="topbar">
    <div class="breadcrumb">
        <a href="index.html">🏠 Accueil</a> › <strong>Test final propre</strong>
    </div>
    <button id="themeToggle" class="theme-btn">
        <span id="themeIcon">🌙</span> <span id="themeLabel">Mode sombre</span>
    </button>
</header>

<main class="container">
    <h1>🔍 Diagnostic final (sans SW)</h1>
    <div id="statusArea" class="status-box">
        <p>Préparation de l'environnement…</p>
    </div>
    <h2>Journal</h2>
    <div id="logArea" class="status-box"></div>
</main>

<div id="footer-container"></div>

<script>
    const logEntries = [];
    function log(msg, type) {
        logEntries.push({ msg, type: type || 'info', time: new Date().toLocaleTimeString() });
        document.getElementById('logArea').innerHTML = logEntries.map(e =>
            `<div class="log-entry" style="color:${e.type==='error'?'red':e.type==='success'?'green':e.type==='warn'?'orange':'inherit'}">
                [${e.time}] ${e.msg}
            </div>`).join('');
    }

    async function cleanAndReload() {
        if (!('serviceWorker' in navigator)) return false;
        const regs = await navigator.serviceWorker.getRegistrations();
        if (regs.length > 0 || navigator.serviceWorker.controller) {
            log('Service worker actif détecté. Nettoyage et rechargement...', 'warn');
            for (const reg of regs) await reg.unregister();
            const keys = await caches.keys();
            for (const key of keys) await caches.delete(key);
            log('Nettoyage terminé, rechargement dans 1 seconde.', 'success');
            setTimeout(() => location.reload(true), 1000);
            return true;
        }
        return false;
    }

    async function runTest() {
        // First, check if SW is still controlling the page
        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            log('Service worker contrôle toujours la page. Nettoyage...', 'warn');
            await cleanAndReload();
            return;
        }

        log('Aucun service worker actif. Test du chargement...', 'success');
        const statusDiv = document.getElementById('statusArea');

        try {
            // Fetch the file directly, bypass cache
            const resp = await fetch('ED-French-ini.js', { cache: 'no-store' });
            const text = await resp.text();
            log(`Statut HTTP: ${resp.status}`, resp.ok ? 'success' : 'warn');
            log(`Taille: ${text.length} octets`, 'info');
            const isHtml = text.trim().startsWith('<!') || text.trim().startsWith('<html');
            log(`Contenu HTML: ${isHtml ? 'OUI' : 'NON'}`, isHtml ? 'error' : 'success');

            if (isHtml) {
                statusDiv.innerHTML = '<p class="fail">❌ Le fichier est toujours servi en HTML. Vérifiez le déploiement et les redirections.</p>';
                return;
            }

            // Execute the JS content
            log('Exécution du script...');
            try {
                new Function(text)();
                log('Exécution réussie.', 'success');
                // Wait a bit for DOM updates
                setTimeout(() => {
                    const hdr = document.querySelector('.site-header');
                    const ftr = document.querySelector('.site-footer');
                    if (hdr && ftr) {
                        statusDiv.innerHTML = '<p class="success">✅ Injection réussie ! Le header et le footer sont visibles.</p>';
                        log('Injection confirmée.', 'success');
                    } else {
                        statusDiv.innerHTML = '<p class="fail">❌ Le script s’est exécuté mais les éléments ne sont pas apparus.</p>';
                        log('Échec de l’injection après exécution.', 'error');
                    }
                }, 300);
            } catch (execErr) {
                log('Erreur d’exécution: ' + execErr.message, 'error');
                statusDiv.innerHTML = '<p class="fail">❌ Le fichier contient des erreurs JavaScript.</p>';
            }
        } catch (netErr) {
            log('Erreur réseau: ' + netErr.message, 'error');
            statusDiv.innerHTML = '<p class="fail">❌ Impossible de charger le fichier.</p>';
        }
    }

    (async () => {
        const needsReload = await cleanAndReload();
        if (!needsReload) {
            runTest();
        }
    })();
</script>
</body>
</html>
