<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test avec nouveau Service Worker</title>
    <style>
        :root {
            --bg: #f9f7f1; --card: #ffffff; --text: #2b2416;
            --text-light: #5c5344; --heading: #382e1e; --accent: #c75b2c;
            --accent-hover: #a3441d; --border: #e5ddd0;
            --button-bg: #f0e8d8; --button-hover: #e3d5bc;
        }
        body.dark {
            --bg: #1e1b17; --card: #2a2620; --text: #e8dfd2;
            --text-light: #b9aa95; --heading: #f0e4d2; --accent: #e07b4a;
            --accent-hover: #f08c5c; --border: #3e3830;
            --button-bg: #3a3329; --button-hover: #4e4437;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: background 0.25s, color 0.25s; }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.8rem 1.6rem; background: var(--card);
            border-bottom: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            position: sticky; top:0; z-index:10;
        }
        .breadcrumb { font-size:0.85rem; color:var(--text-light); }
        .breadcrumb a { color:var(--accent); text-decoration:none; font-weight:600; }
        .theme-btn {
            display:inline-flex; align-items:center; gap:0.4rem;
            padding:0.45rem 0.9rem; border-radius:20px;
            border:1px solid var(--border); background: var(--button-bg);
            color:var(--text); cursor:pointer; font-size:0.85rem; font-weight:600;
            transition: all 0.25s;
        }
        .theme-btn:hover { background: var(--button-hover); }
        .container { max-width:800px; margin:0 auto; padding:2rem 1.4rem; }
        .status-box {
            background: var(--card); border:1px solid var(--border);
            border-radius:12px; padding:1.2rem; margin:1rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            word-break: break-all;
        }
        .success { color: #2e7d32; font-weight: bold; }
        .fail { color: #c62828; font-weight: bold; }
        .log { font-size:0.85rem; margin:0.5rem 0; }
        .log-entry { padding:0.2rem 0; border-bottom:1px solid var(--border); }
    </style>
</head>
<body>
<div id="header-container"></div>

<header class="topbar">
    <div class="breadcrumb">
        <a href="index.html">🏠 Accueil</a> › <strong>Test SW fix</strong>
    </div>
    <button id="themeToggle" class="theme-btn">
        <span id="themeIcon">🌙</span> <span id="themeLabel">Mode sombre</span>
    </button>
</header>

<main class="container">
    <h1>🔍 Nettoyage du Service Worker + Test</h1>
    <div id="statusArea" class="status-box">
        <p>Nettoyage du cache et mise à jour du service worker…</p>
    </div>
    <h2>Journal détaillé</h2>
    <div id="logArea" class="status-box"></div>
</main>

<div id="footer-container"></div>

<script>
    const logEntries = [];
    function log(msg, type) {
        logEntries.push({ msg, type: type || 'info', time: new Date().toLocaleTimeString() });
        document.getElementById('logArea').innerHTML = logEntries.map(e =>
            `<div class="log-entry" style="color:${e.type==='error'?'red':e.type==='success'?'green':e.type==='warn'?'orange':'inherit'}">
                [${e.time}] ${e.msg}
            </div>`).join('');
    }

    window.onerror = (message, source, lineno, colno, error) =>
        log(`ERREUR: ${message} (${source}:${lineno})`, 'error');

    const status = document.getElementById('statusArea');

    async function cleanAndRegister() {
        // 1. Unregister any existing service worker
        if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            log(`Nombre de SW trouvés: ${registrations.length}`);
            for (const reg of registrations) {
                const deleted = await reg.unregister();
                log(`SW "${reg.scope}" désinstallé: ${deleted}`, deleted ? 'success' : 'warn');
            }
            // 2. Clear all caches
            const cacheNames = await caches.keys();
            log(`Caches trouvés: ${cacheNames.length}`);
            for (const name of cacheNames) {
                await caches.delete(name);
                log(`Cache "${name}" supprimé`, 'success');
            }
            // 3. Register the new service worker (sw.js)
            try {
                const registration = await navigator.serviceWorker.register('/sw.js');
                log('Nouveau SW enregistré: ' + registration.scope, 'success');
                // Wait for activation
                if (registration.installing) {
                    const sw = registration.installing;
                    await new Promise((resolve) => {
                        sw.addEventListener('statechange', () => {
                            if (sw.state === 'activated') resolve();
                        });
                    });
                } else if (registration.waiting) {
                    registration.waiting.postMessage('skipWaiting');
                }
                log('SW activé et prêt.', 'success');
            } catch (err) {
                log('Erreur enregistrement SW: ' + err.message, 'error');
            }
        }
    }

    async function testInjection() {
        log('Chargement du script externe…');
        // Remove any existing script tag to avoid double loading
        const oldScript = document.querySelector('script[src="ED-French-ini.js"]');
        if (oldScript) oldScript.remove();

        const script = document.createElement('script');
        script.src = 'ED-French-ini.js';
        script.onload = () => {
            log('Script chargé et exécuté.', 'success');
            setTimeout(() => {
                const hdr = document.querySelector('.site-header');
                const ftr = document.querySelector('.site-footer');
                if (hdr && ftr) {
                    status.innerHTML = '<p class="success">✅ Injection réussie après nettoyage SW. Header et footer visibles.</p>';
                    log('Injection confirmée !', 'success');
                } else {
                    status.innerHTML = '<p class="fail">❌ Injection toujours échouée.</p>';
                    log('Échec.', 'error');
                }
            }, 300);
        };
        script.onerror = () => {
            log('Erreur de chargement du script.', 'error');
            status.innerHTML = '<p class="fail">❌ Le script n’a pas pu être chargé.</p>';
        };
        document.head.appendChild(script);
    }

    (async () => {
        await cleanAndRegister();
        // Wait a moment for SW activation, then test
        setTimeout(testInjection, 500);
    })();
</script>
</body>
</html>
