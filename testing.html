<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test final (sans Service Worker)</title>
    <style>
        :root {
            --bg: #f9f7f1; --card: #ffffff; --text: #2b2416;
            --text-light: #5c5344; --heading: #382e1e; --accent: #c75b2c;
            --accent-hover: #a3441d; --border: #e5ddd0;
            --button-bg: #f0e8d8; --button-hover: #e3d5bc;
        }
        body.dark {
            --bg: #1e1b17; --card: #2a2620; --text: #e8dfd2;
            --text-light: #b9aa95; --heading: #f0e4d2; --accent: #e07b4a;
            --accent-hover: #f08c5c; --border: #3e3830;
            --button-bg: #3a3329; --button-hover: #4e4437;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: background 0.25s, color 0.25s; }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.8rem 1.6rem; background: var(--card);
            border-bottom: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            position: sticky; top:0; z-index:10;
        }
        .breadcrumb { font-size:0.85rem; color:var(--text-light); }
        .breadcrumb a { color:var(--accent); text-decoration:none; font-weight:600; }
        .theme-btn {
            display:inline-flex; align-items:center; gap:0.4rem;
            padding:0.45rem 0.9rem; border-radius:20px;
            border:1px solid var(--border); background: var(--button-bg);
            color:var(--text); cursor:pointer; font-size:0.85rem; font-weight:600;
            transition: all 0.25s;
        }
        .theme-btn:hover { background: var(--button-hover); }
        .container { max-width:800px; margin:0 auto; padding:2rem 1.4rem; }
        .status-box {
            background: var(--card); border:1px solid var(--border);
            border-radius:12px; padding:1.2rem; margin:1rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            word-break: break-all;
        }
        .success { color: #2e7d32; font-weight: bold; }
        .fail { color: #c62828; font-weight: bold; }
        .log { font-size:0.85rem; margin:0.5rem 0; }
        .log-entry { padding:0.2rem 0; border-bottom:1px solid var(--border); }
    </style>
</head>
<body>
<div id="header-container"></div>

<header class="topbar">
    <div class="breadcrumb">
        <a href="index.html">🏠 Accueil</a> › <strong>Test final</strong>
    </div>
    <button id="themeToggle" class="theme-btn">
        <span id="themeIcon">🌙</span> <span id="themeLabel">Mode sombre</span>
    </button>
</header>

<main class="container">
    <h1>🔍 Diagnostic sans Service Worker</h1>
    <div id="statusArea" class="status-box">
        <p>Suppression des SW et test réseau…</p>
    </div>
    <h2>Journal</h2>
    <div id="logArea" class="status-box"></div>
</main>

<div id="footer-container"></div>

<script>
    const logEntries = [];
    function log(msg, type) {
        logEntries.push({ msg, type: type || 'info', time: new Date().toLocaleTimeString() });
        document.getElementById('logArea').innerHTML = logEntries.map(e =>
            `<div class="log-entry" style="color:${e.type==='error'?'red':e.type==='success'?'green':e.type==='warn'?'orange':'inherit'}">
                [${e.time}] ${e.msg}
            </div>`).join('');
    }

    window.onerror = (message, source, lineno, colno, error) =>
        log(`ERREUR: ${message} (${source}:${lineno})`, 'error');

    const status = document.getElementById('statusArea');

    async function cleanAllSW() {
        if (!('serviceWorker' in navigator)) return;
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (const reg of registrations) {
            await reg.unregister();
            log(`SW désinstallé: ${reg.scope}`, 'success');
        }
        const keys = await caches.keys();
        for (const key of keys) {
            await caches.delete(key);
            log(`Cache supprimé: ${key}`, 'success');
        }
    }

    async function testScript() {
        log('Tentative de chargement de ED-French-ini.js via balise script...');
        const script = document.createElement('script');
        script.src = 'ED-French-ini.js';
        script.onload = () => {
            log('Script chargé avec succès !', 'success');
            setTimeout(() => {
                const hdr = document.querySelector('.site-header');
                const ftr = document.querySelector('.site-footer');
                if (hdr && ftr) {
                    status.innerHTML = '<p class="success">✅ Injection réussie sans SW.</p>';
                    log('Injection confirmée.', 'success');
                } else {
                    status.innerHTML = '<p class="fail">❌ Injection échouée malgré le chargement.</p>';
                    log('Header/Footer introuvables.', 'error');
                }
            }, 300);
        };
        script.onerror = async () => {
            log('Échec du chargement. Analyse réseau...', 'error');
            try {
                const resp = await fetch('ED-French-ini.js');
                const text = await resp.text();
                log(`Statut: ${resp.status}`, resp.ok ? 'success' : 'error');
                log(`Content-Type: ${resp.headers.get('Content-Type')}`, 'info');
                log(`Premiers caractères: ${text.substring(0, 80)}`, 'info');
                log(`Est du HTML: ${text.trim().startsWith('<!') ? 'OUI' : 'NON'}`, text.trim().startsWith('<!') ? 'error' : 'success');
                if (text.trim().startsWith('<!')) {
                    status.innerHTML = '<p class="fail">❌ Le serveur renvoie du HTML au lieu du JS. Vérifiez les redirections Netlify.</p>';
                } else {
                    status.innerHTML = '<p class="fail">❌ Le script semble correct mais n’a pas été exécuté (problème de MIME ou de sécurité).</p>';
                }
            } catch (e) {
                log(`Erreur fetch: ${e.message}`, 'error');
                status.innerHTML = '<p class="fail">❌ Impossible de joindre le fichier.</p>';
            }
        };
        document.head.appendChild(script);
    }

    (async () => {
        await cleanAllSW();
        log('SW et caches nettoyés.', 'success');
        testScript();
    })();
</script>
</body>
</html>
