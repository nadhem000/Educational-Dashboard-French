<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test injection externe (ED‑French‑ini.js)</title>
    <style>
        :root {
            --bg: #f9f7f1; --card: #ffffff; --text: #2b2416;
            --text-light: #5c5344; --heading: #382e1e; --accent: #c75b2c;
            --accent-hover: #a3441d; --border: #e5ddd0;
            --button-bg: #f0e8d8; --button-hover: #e3d5bc;
        }
        body.dark {
            --bg: #1e1b17; --card: #2a2620; --text: #e8dfd2;
            --text-light: #b9aa95; --heading: #f0e4d2; --accent: #e07b4a;
            --accent-hover: #f08c5c; --border: #3e3830;
            --button-bg: #3a3329; --button-hover: #4e4437;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: background 0.25s, color 0.25s; }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.8rem 1.6rem; background: var(--card);
            border-bottom: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            position: sticky; top:0; z-index:10;
        }
        .breadcrumb { font-size:0.85rem; color:var(--text-light); }
        .breadcrumb a { color:var(--accent); text-decoration:none; font-weight:600; }
        .theme-btn {
            display:inline-flex; align-items:center; gap:0.4rem;
            padding:0.45rem 0.9rem; border-radius:20px;
            border:1px solid var(--border); background: var(--button-bg);
            color:var(--text); cursor:pointer; font-size:0.85rem; font-weight:600;
            transition: all 0.25s;
        }
        .theme-btn:hover { background: var(--button-hover); }
        .container { max-width:800px; margin:0 auto; padding:2rem 1.4rem; }
        .status-box {
            background: var(--card); border:1px solid var(--border);
            border-radius:12px; padding:1.2rem; margin:1rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .success { color: #2e7d32; font-weight: bold; }
        .fail { color: #c62828; font-weight: bold; }
        .log { font-size:0.85rem; margin:0.5rem 0; }
        .log-entry { padding:0.2rem 0; border-bottom:1px solid var(--border); }
    </style>
</head>
<body>
<div id="header-container"></div>

<header class="topbar">
    <div class="breadcrumb">
        <a href="index.html">🏠 Accueil</a> › <strong>Test script externe</strong>
    </div>
    <button id="themeToggle" class="theme-btn">
        <span id="themeIcon">🌙</span> <span id="themeLabel">Mode sombre</span>
    </button>
</header>

<main class="container">
    <h1>🔍 Test du script externe (ED‑French‑ini.js)</h1>
    <div id="statusArea" class="status-box">
        <p>Chargement du script externe…</p>
    </div>
    <h2>Logs</h2>
    <div id="logArea" class="status-box"></div>
</main>

<div id="footer-container"></div>

<!-- Chargement du script externe avec cache-busting -->
<script>
fetch('ED-French-ini.js?v=2')
  .then(r => r.text())
  .then(t => new Function(t)());
</script>

<!-- Vérification post-chargement -->
<script>
    const logEntries = [];
    function log(msg, type) {
        logEntries.push({ msg, type: type || 'info', time: new Date().toLocaleTimeString() });
        renderLogs();
    }
    function renderLogs() {
        const area = document.getElementById('logArea');
        area.innerHTML = logEntries.map(e =>
            `<div class="log-entry" style="color:${e.type==='error'?'red':e.type==='success'?'green':'inherit'}">
                [${e.time}] ${e.msg}
            </div>`
        ).join('');
    }

    window.onerror = function(message, source, lineno, colno, error) {
        log('ERREUR: ' + message + ' (' + source + ' ligne ' + lineno + ')', 'error');
        return false;
    };

    log('Test démarré. Attente de l’exécution du script externe…');

    // Vérifier après un court délai que l'injection a bien eu lieu
    setTimeout(() => {
        const siteHeader = document.querySelector('.site-header');
        const siteFooter = document.querySelector('.site-footer');
        const statusArea = document.getElementById('statusArea');

        if (siteHeader && siteFooter) {
            log('✅ .site-header et .site-footer détectés. Injection réussie.', 'success');
            statusArea.innerHTML = '<p class="success">✅ Le script externe a correctement injecté le header et le footer.</p>';
        } else {
            log('❌ Échec : les éléments injectés sont absents.', 'error');
            statusArea.innerHTML = '<p class="fail">❌ Le script externe n’a pas injecté les éléments. Vérifiez la console.</p>';
        }
    }, 500);
</script>
</body>
</html>
