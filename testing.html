<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test injection externe (debug complet)</title>
    <style>
        :root {
            --bg: #f9f7f1; --card: #ffffff; --text: #2b2416;
            --text-light: #5c5344; --heading: #382e1e; --accent: #c75b2c;
            --accent-hover: #a3441d; --border: #e5ddd0;
            --button-bg: #f0e8d8; --button-hover: #e3d5bc;
        }
        body.dark {
            --bg: #1e1b17; --card: #2a2620; --text: #e8dfd2;
            --text-light: #b9aa95; --heading: #f0e4d2; --accent: #e07b4a;
            --accent-hover: #f08c5c; --border: #3e3830;
            --button-bg: #3a3329; --button-hover: #4e4437;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Georgia, serif; background: var(--bg); color: var(--text); line-height: 1.7; transition: background 0.25s, color 0.25s; }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.8rem 1.6rem; background: var(--card);
            border-bottom: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            position: sticky; top:0; z-index:10;
        }
        .breadcrumb { font-size:0.85rem; color:var(--text-light); }
        .breadcrumb a { color:var(--accent); text-decoration:none; font-weight:600; }
        .theme-btn {
            display:inline-flex; align-items:center; gap:0.4rem;
            padding:0.45rem 0.9rem; border-radius:20px;
            border:1px solid var(--border); background: var(--button-bg);
            color:var(--text); cursor:pointer; font-size:0.85rem; font-weight:600;
            transition: all 0.25s;
        }
        .theme-btn:hover { background: var(--button-hover); }
        .container { max-width:800px; margin:0 auto; padding:2rem 1.4rem; }
        .status-box {
            background: var(--card); border:1px solid var(--border);
            border-radius:12px; padding:1.2rem; margin:1rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            word-break: break-all;
        }
        .success { color: #2e7d32; font-weight: bold; }
        .fail { color: #c62828; font-weight: bold; }
        .log { font-size:0.85rem; margin:0.5rem 0; }
        .log-entry { padding:0.2rem 0; border-bottom:1px solid var(--border); }
    </style>
</head>
<body>
<div id="header-container"></div>

<header class="topbar">
    <div class="breadcrumb">
        <a href="index.html">🏠 Accueil</a> › <strong>Test debug complet</strong>
    </div>
    <button id="themeToggle" class="theme-btn">
        <span id="themeIcon">🌙</span> <span id="themeLabel">Mode sombre</span>
    </button>
</header>

<main class="container">
    <h1>🔍 Diagnostic automatique du script externe</h1>
    <div id="statusArea" class="status-box">
        <p>Lancement du diagnostic…</p>
    </div>
    <h2>Journal détaillé</h2>
    <div id="logArea" class="status-box"></div>
</main>

<div id="footer-container"></div>

<script>
    const logEntries = [];
    function log(msg, type) {
        logEntries.push({ msg, type: type || 'info', time: new Date().toLocaleTimeString() });
        document.getElementById('logArea').innerHTML = logEntries.map(e =>
            `<div class="log-entry" style="color:${e.type==='error'?'red':e.type==='success'?'green':e.type==='warn'?'orange':'inherit'}">
                [${e.time}] ${e.msg}
            </div>`).join('');
    }

    window.onerror = (message, source, lineno, colno, error) => log(`ERREUR: ${message} (${source}:${lineno})`, 'error');

    const status = document.getElementById('statusArea');

    async function runDiagnostic() {
        log('Téléchargement de ED-French-ini.js…');
        try {
            const response = await fetch('ED-French-ini.js?v=' + Date.now());
            log(`Status HTTP: ${response.status}`, response.ok ? 'success' : 'warn');
            log(`Content-Type: ${response.headers.get('Content-Type')}`, 'info');
            const text = await response.text();
            log(`Taille: ${text.length} octets`, 'info');
            const isHtml = text.trim().startsWith('<!DOCTYPE') || text.trim().startsWith('<html');
            log(`Contient du HTML: ${isHtml ? 'OUI' : 'NON'}`, isHtml ? 'error' : 'success');
            if (isHtml) {
                status.innerHTML = '<p class="fail">❌ Le fichier est servi en HTML, pas en JavaScript. Le serveur ne trouve pas le fichier ou redirige vers index.html.</p>';
                return;
            }
            // Tente d'exécuter le contenu
            log('Tentative d’exécution du script…');
            try {
                new Function(text)();
                log('Script exécuté sans erreur.', 'success');
            } catch (execErr) {
                log('Erreur d’exécution: ' + execErr.message, 'error');
                status.innerHTML = '<p class="fail">❌ Le fichier contient des erreurs JavaScript.</p>';
                return;
            }
            // Vérification post-injection
            setTimeout(() => {
                const hdr = document.querySelector('.site-header');
                const ftr = document.querySelector('.site-footer');
                if (hdr && ftr) {
                    status.innerHTML = '<p class="success">✅ Injection réussie – le header et le footer sont visibles.</p>';
                    log('Injection confirmée.', 'success');
                } else {
                    status.innerHTML = '<p class="fail">❌ Injection échouée malgré l’exécution du script.</p>';
                    log('Header/Footer introuvables après exécution.', 'error');
                }
            }, 300);
        } catch (netErr) {
            log('Erreur réseau: ' + netErr.message, 'error');
            status.innerHTML = '<p class="fail">❌ Impossible de charger le fichier (problème réseau ou CORS).</p>';
        }
    }

    runDiagnostic();
</script>
</body>
</html>
