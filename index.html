<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Educational Dashboard – French | Lessons, Review, Tests</title>
   <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="shared.css">
    <style>
        :root {
            --bg: #f9f7f3;
            --card-bg: #ffffff;
            --text: #2c2416;
            --text-light: #5c5344;
            --accent: #c75b2c;
            --accent-hover: #a3441d;
            --border: #e5ddd0;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-hover: 0 10px 25px rgba(0,0,0,0.08);
            --radius: 12px;
            --transition: 0.25s ease;
            --font: 'Segoe UI', 'Georgia', serif;
            --subcard-bg: #fdf9f4;
        }
        body.dark {
            --bg: #1e1b17;
            --card-bg: #2a2620;
            --text: #e8dfd2;
            --text-light: #b9aa95;
            --accent: #e07b4a;
            --accent-hover: #f08c5c;
            --border: #3e3830;
            --shadow: 0 2px 8px rgba(0,0,0,0.25);
            --shadow-hover: 0 10px 25px rgba(0,0,0,0.35);
            --subcard-bg: #24211b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; transition: background var(--transition), color var(--transition); }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 3rem; }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 0.5rem; color: var(--text); }
        .subtitle { text-align: center; color: var(--text-light); margin-bottom: 2.5rem; font-size: 1rem; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); transition: all var(--transition); overflow: hidden; display: flex; flex-direction: column; cursor: default; }
        .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
        .card-header { padding: 1rem 1.2rem; font-weight: 700; font-size: 1.1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; color: var(--text); }
        .card-body { padding: 1rem 1.2rem; flex:1; color: var(--text-light); font-size: 0.9rem; }
        .coming-soon { color: #aaa; font-style: italic; display: flex; align-items: center; gap:0.4rem; }
        .badge { display: inline-block; background: var(--accent); color: #fff; padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
        .sections-list { list-style: none; margin-top: 0.5rem; }
        .sections-list li { background: var(--subcard-bg); margin-bottom: 0.4rem; padding: 0.5rem 0.8rem; border-radius: 6px; font-size: 0.85rem; border: 1px solid var(--border); color: var(--text-light); }
        .expand-btn { background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer; font-size: 0.85rem; margin-top: 0.3rem; text-decoration: underline; transition: color var(--transition); }
        .expand-btn:hover { color: var(--accent-hover); }
        .card.revision { border: 2px solid var(--accent); background: linear-gradient(145deg, #fdf6ed, var(--card-bg)); }
        .card.revision .card-header { background: var(--accent); color: #fff; border-bottom: none; }
        .card.revision .card-body { font-weight: 500; }
        .card.revision a { display: inline-block; margin-top: 0.8rem; background: var(--accent); color: #fff; padding: 0.5rem 1.2rem; border-radius: 20px; text-decoration: none; font-weight: 600; transition: background var(--transition); }
        .card.revision a:hover { background: var(--accent-hover); }
        @media (max-width:600px) { .cards-grid { grid-template-columns: 1fr; } h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="container">
<h1>Educational Dashboard – French</h1>
        <p class="subtitle">Des révisions pour le primaire, le secondaire et une section de révision générale complète.</p>
        <div class="cards-grid" id="cardGrid"></div>
    </div>
    <script src="ed-french-ini.js"></script>
</body>
</html>
