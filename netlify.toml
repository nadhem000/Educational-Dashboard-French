[build]
  publish = "."

# Prevent SPA fallback for the script file
[[redirects]]
  from = "/ED-French-ini.js"
  to = "/ED-French-ini.js"
  status = 200
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"