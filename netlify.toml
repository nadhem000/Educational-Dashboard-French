[build]
  publish = "."

# Redirect clean URLs (like /revision) to index.html only when no matching file
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# But force true for the actual HTML pages we want to redirect (just in case)
[[redirects]]
  from = "/revision"
  to = "/revision.html"
  status = 200

# Serve static files directly – these rules override the catch-all
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/ED-French-ini.js"
  to = "/ED-French-ini.js"
  status = 200

[[redirects]]
  from = "/*.js"
  to = "/:splat.js"
  status = 200

[[redirects]]
  from = "/*.css"
  to = "/:splat.css"
  status = 200

[[redirects]]
  from = "/*.png"
  to = "/:splat.png"
  status = 200

[[redirects]]
  from = "/*.ico"
  to = "/:splat.ico"
  status = 200

[[redirects]]
  from = "/*.json"
  to = "/:splat.json"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"