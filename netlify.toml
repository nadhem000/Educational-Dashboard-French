[build]
  publish = "."

# Redirect clean URLs to .html files (for pages like /revision)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# BUT we must exclude existing files and directories
# Override the catch-all with exceptions for real files
[[redirects]]
  from = "/ED-French-ini.js"
  to = "/ED-French-ini.js"
  status = 200

[[redirects]]
  from = "/*.js"
  to = "/:splat.js"
  status = 200

[[redirects]]
  from = "/*.css"
  to = "/:splat.css"
  status = 200

[[redirects]]
  from = "/*.png"
  to = "/:splat.png"
  status = 200

[[redirects]]
  from = "/*.jpg"
  to = "/:splat.jpg"
  status = 200

[[redirects]]
  from = "/*.svg"
  to = "/:splat.svg"
  status = 200

[[redirects]]
  from = "/*.ico"
  to = "/:splat.ico"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"