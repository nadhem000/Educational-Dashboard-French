# Netlify Configuration – Educational Dashboard – French
# Documentation : https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Site statique, pas de build nécessaire
  publish = "."

# En-têtes HTTP personnalisés
[[headers]]
  # Page d'accueil (HTML)
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; form-action 'self'; base-uri 'self'"

[[headers]]
  # Page de révision
  for = "/revision.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  # Service Worker (doit être revalidé à chaque requête)
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
    X-Content-Type-Options = "nosniff"

[[headers]]
  # Manifest PWA
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"
    X-Content-Type-Options = "nosniff"

[[headers]]
  # Images et icônes (longue durée de cache)
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  # Fichiers CSS et JS inline servis via le HTML – pour les ressources externes éventuelles
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  # Fichiers de police (si ajoutés ultérieurement)
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirections
[[redirects]]
  # Rediriger la racine vers index.html proprement
  from = "/"
  to = "/index.html"
  status = 200
  force = false

[[redirects]]
  # Fallback SPA-like pour les routes inconnues
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Règles de déploiement contextuel (optionnel)
[context.production]
  # Environnement de production

[context.deploy-preview]
  # Déploiements de prévisualisation

[context.branch-deploy]
  # Déploiements de branche